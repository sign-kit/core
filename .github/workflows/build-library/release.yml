name: Build @sign-kit/core library
description: >
  Sets up Node, installs workspace dependencies, stamps the library version,
  then runs all four build steps (types → ESM/CJS → WC IIFE → copy-styles).

inputs:
  version:
    description: >
      Exact semver string to write into packages/pdf-sign-kit/package.json
      before building (e.g. "1.2.3" or "1.2.3-PR-7"). Must not include a
      leading "v" prefix.
    required: true
  node-version:
    description: Node.js version to use.
    required: false
    default: '20'

runs:
  using: composite
  steps:
    # -- Node / npm ------------------------------------------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      shell: bash
      run: npm i

    # -- Version stamp ---------------------------------------------------------
    - name: Stamp version into package.json
      shell: bash
      working-directory: packages/pdf-sign-kit
      run: |
        npm version "${{ inputs.version }}" \
          --no-git-tag-version \
          --allow-same-version
        echo "packages/pdf-sign-kit version set to ${{ inputs.version }}"

    # -- Build -----------------------------------------------------------------
    - name: Build types
      shell: bash
      working-directory: packages/pdf-sign-kit
      run: npm run build:types

    - name: Build ESM + CJS bundles
      shell: bash
      working-directory: packages/pdf-sign-kit
      run: npm run build:lib

    - name: Build Web Component IIFE bundle
      shell: bash
      working-directory: packages/pdf-sign-kit
      run: npm run build:wc

    - name: Copy styles to dist
      shell: bash
      working-directory: packages/pdf-sign-kit
      run: npm run build:copy-styles
