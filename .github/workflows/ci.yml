name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  tests:
    uses: ./.github/workflows/reusable-tests.yml
    with:      
      run-e2e: true

  build:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:          
          cache: 'npm'
      - name: Install dependencies
        run: npm i
      - name: Build packages
        run: npm run build --workspaces
