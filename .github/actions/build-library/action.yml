name: Build Library

description: |
  Composite action to setup Node, stamp the package version, and build the repository

inputs:
  version:
    description: Semver version to write into packages/pdf-sign-kit/package.json
    required: true
  node-version:
    description: Node.js version to use for the build
    required: false
    default: '18'

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Stamp package version
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        if [ -z "$VERSION" ]; then
          echo "No version provided; skipping version stamping"
        else
          node -e "const fs=require('fs'); const path='./packages/pdf-sign-kit/package.json'; const p=JSON.parse(fs.readFileSync(path)); p.version=process.env.VERSION; fs.writeFileSync(path, JSON.stringify(p,null,2)+"\n"); console.log('Stamped',path,'->',process.env.VERSION)"
        fi

    - name: Build packages
      run: npm run build
